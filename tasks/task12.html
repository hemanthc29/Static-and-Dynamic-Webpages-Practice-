<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Back to Top Button</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="task12.css">
</head>
<body>
    <div class="content">
        <h1>Scroll Down</h1>
        <p>A floating "Back to Top" button is fixed in the bottom right corner of this page viewport.</p>
        <p class="filler">Scrolling content area...</p>
    </div>
    <button class="back-to-top-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">↑</button>
</body>
</html>
