<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="task8.css">
</head>
<body>
    <form class="login-form" onsubmit="event.preventDefault();">
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your credentials to login</p>
        <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" required placeholder="name@domain.com">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="submit-btn">Sign In</button>
    </form>
</body>
</html>
