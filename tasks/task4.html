<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="task4.css">
</head>
<body>
    <div class="product-card">
        <div class="image-container">
            <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&q=80&w=300" alt="Wireless Headphones">
        </div>
        <div class="product-info">
            <h2 class="product-name">Studio Wireless Headphones</h2>
            <div class="rating">
                <span class="stars">★★★★★</span>
                <span class="score">4.8 (120 reviews)</span>
            </div>
            <div class="price-wrapper">
                <span class="price">$199.00</span>
                <span class="old-price">$249.00</span>
            </div>
            <button class="add-btn">Add to Cart</button>
        </div>
    </div>
</body>
</html>
