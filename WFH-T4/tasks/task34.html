<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipping Product Card</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="task34.css">
</head>
<body>
    <div class="flip-card">
        <div class="flip-card-inner">
            <div class="flip-card-front">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&q=80&w=250" alt="Product Front View">
            </div>
            <div class="flip-card-back">
                <h3>Vibrant Red Athletic Runners</h3>
                <p>Engineered rubber mesh upper with custom impact compression sole.</p>
                <p class="price">$120.00</p>
            </div>
        </div>
    </div>
</body>
</html>
