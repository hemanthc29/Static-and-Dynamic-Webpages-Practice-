<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="task24.css">
</head>
<body>
    <div class="dashboard-grid">
        <div class="widget card-attendance">
            <h3>Attendance Status</h3>
            <p class="large-text">92.4%</p>
            <p class="desc">Above target minimum (75%)</p>
        </div>
        <div class="widget card-marks">
            <h3>Cumulative Marks</h3>
            <p class="large-text">A+ Grade</p>
            <p class="desc">Semester average: 9.2 GPA</p>
        </div>
        <div class="widget card-assignments">
            <h3>Assignments</h3>
            <p class="large-text">2 Pending</p>
            <p class="desc">Due date: 3 days remaining</p>
        </div>
        <div class="widget card-notifications">
            <h3>System Notifications</h3>
            <ul class="list">
                <li>Register for Hackathon</li>
                <li>Holiday on July 4th</li>
            </ul>
        </div>
    </div>
</body>
</html>
